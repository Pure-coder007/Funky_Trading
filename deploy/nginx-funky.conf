server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/funky;
    index index.html;

    access_log /var/log/nginx/funky.access.log;
    error_log /var/log/nginx/funky.error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
